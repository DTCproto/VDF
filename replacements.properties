{"MainWindow.Settings.LogExcludedFilesTooltip": "Log when files are excluded from the scan and why (limited to avoid log spam)."}={"MainWindow.Settings.LogExcludedFilesTooltip": "记录文件被排除扫描的原因（为避免日志过多而受限）。"}
{"MainWindow.Settings.MaxDegreeOfParallelism": "Max Degree Of Parallelism:"}={"MainWindow.Settings.MaxDegreeOfParallelism": "最大并行度："}
{"MainWindow.Settings.MaxDegreeOfParallelismTooltip": "Limits the amount of concurrent tasks. A value of -1 leaves it up to the system to decide (takes full speed), a value of 1 is most stable (lets you interact with your system while scan runs in background). Maximum should be the amount of physical cores of your CPU."}={"MainWindow.Settings.MaxDegreeOfParallelismTooltip": "限制并发任务的数量。值为 -1 表示由系统决定（全速运行），值为 1 最稳定（允许您在扫描后台运行时与系统交互）。最大值应为 CPU 的物理核心数。"}
