{"MainWindow.Settings.ThumbnailsTooltip": "Number of thumbnails generated per file. This only applies to video files. A high number means that the scan takes longer but also the chance of a 'false positive' decreases."}={"MainWindow.Settings.ThumbnailsTooltip": "每个文件生成的缩略图数量。这仅适用于视频文件。数量越多，扫描所需时间越长，但“误报”的几率也会降低。"}
{"MainWindow.Settings.UseExifCreationDate": "Use EXIF Creation Date for Images"}={"MainWindow.Settings.UseExifCreationDate": "对图像使用 EXIF 创建日期"}
{"MainWindow.Settings.UseExifCreationDateTooltip": "Read creation date from EXIF metadata (DateTimeOriginal) instead of file system date. Useful when file creation date is not accurate."}={"MainWindow.Settings.UseExifCreationDateTooltip": "从 EXIF 元数据 (DateTimeOriginal) 读取创建日期，而不是文件系统日期。当文件创建日期不准确时很有用。"}
{"MainWindow.Settings.UseMica": "Use Mica (Windows 11 only)¹"}={"MainWindow.Settings.UseMica": "使用 Mica (仅限 Windows 11)¹"}
{"MainWindow.Settings.UseNativeFfmpegBinding": "Use native Ffmpeg binding"}={"MainWindow.Settings.UseNativeFfmpegBinding": "使用原生 Ffmpeg 绑定"}
{"MainWindow.Settings.UseNativeFfmpegBindingTooltip": "If activated it will call ffmpeg functions natively instead of spawning a new ffmpeg.exe process. This is MUCH(!!) faster. WARNING: You must use the latest SHARED and STABLE ffmpeg version. If something goes wrong then whole VDF will crash."}={"MainWindow.Settings.UseNativeFfmpegBindingTooltip": "如果激活，它将原生调用 ffmpeg 函数，而不是生成新的 ffmpeg.exe 进程。这非常快（！！）。警告：您必须使用最新的 SHARED 和 STABLE 版本的 ffmpeg。如果出现问题，整个 VDF 将崩溃。"}
{"MainWindow.Settings.UsePHashing": "Use pHash instead of visual similarity"}={"MainWindow.Settings.UsePHashing": "使用 pHash 而非视觉相似性"}
{"MainWindow.Settings.UsePHashingTooltip": "pHash = slower but more robust to re-encoding, resizing, contrast changes etc. Visual similarity = faster, also works on reencoded videos, watermarks etc but less robust. Ignored if you're using an old database with 16x16 graybyte values."}={"MainWindow.Settings.UsePHashingTooltip": "pHash = 较慢，但对重新编码、调整大小、对比度更改等更稳健。视觉相似性 = 较快，也适用于重新编码的视频、水印等，但稳健性较差。如果您使用的是具有 16x16 灰度字节值的旧数据库，则忽略此设置。"}
{"MainWindow.Settings.WildcardNote": "Note: Supports the following wildcards: '*' and '?'. The backslash character '\\' escapes."}={"MainWindow.Settings.WildcardNote": "注意：支持以下通配符：'*' 和 '?'。反斜杠字符 '\\' 用于转义。"}
