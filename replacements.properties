{ToolTip.Tip="Deactivate to save memory by disabling preview images of duplicates"}={ToolTip.Tip="禁用重复项预览图像以节省内存"}
{ToolTip.Tip="Symbolic links and junction only. Note this will completely skip these from file enumeration to search."}={ToolTip.Tip="仅适用于符号链接和交接点。注意：这将完全跳过文件枚举至搜索过程。"}
{ToolTip.Tip="Unlike reparse points hard links are still included in search but are not considered as duplicates. WARNING: Use this option only when necessary, as it slows down the scanning process considerably!"}={ToolTip.Tip="与重解析点不同，硬链接仍参与搜索但不视为重复项。警告：显著降低扫描速度，请谨慎使用！"}
{ToolTip.Tip="If activated ffmpeg and ffprobe errors will be written to the log"}={ToolTip.Tip="启用后将ffmpeg/ffprobe错误写入日志"}
{ToolTip.Tip="If activated scan engine will try to generate thumbprints of failed entries each time it is run. Otherwise consecutive attempt will be taken only after cleanup of the database."}={ToolTip.Tip="启用后每次运行都将重试失败条目的缩略图生成，否则需清理数据库后才重试。"}
{ToolTip.Tip="If activated a backup gets created each time the scan results list gets changed"}={ToolTip.Tip="扫描结果变更时自动创建备份"}
{ToolTip.Tip="If activated it will call ffmpeg functions natively instead of spawning a new ffmpeg.exe process. This is MUCH(!!) faster. WARNING: You must use the latest SHARED and STABLE ffmpeg version. If something goes wrong then whole VDF will crash."}={ToolTip.Tip="启用原生FFmpeg调用（非进程调用），速度极快！警告：需最新SHARED稳定版FFmpeg，否则可能导致VDF崩溃。"}
{ToolTip.Tip="Skip black pixels when comparing thumbnails. Lowers the chance for 'false positives' if thumbnails contain too much dark and raises the chance to detect duplicates if one of the thumbnails have black bars and the others not. In rare scenarios this might raise the 'false positives' instead. Slows down the scan speed by a bit."}={ToolTip.Tip="缩略图比对时忽略黑色像素。减少暗色过多导致的误报，提高带黑边视频的查重率。偶发可能增加误报，轻微影响扫描速度。"}

{ToolTip.Tip="Skip white pixels when comparing thumbnails. Lowers the chance for 'false positives' if thumbnails contain too much brightness and raises the chance to detect duplicates if one of the thumbnails have white bars and the others not. In rare scenarios this might raise the 'false positives' instead. Slows down the scan speed by a bit."}={ToolTip.Tip="缩略图比对时忽略白色像素。减少高亮过多导致的误报，提高带白边视频的查重率。偶发可能增加误报，轻微影响扫描速度。"}
{ToolTip.Tip="Select this option if your video collection might contain horizontally flipped videos and you want them to be detected reliably. Slows down the scan speed by a bit."}={ToolTip.Tip="检测水平翻转视频时启用，可提高识别率，轻微影响扫描速度。"}
{ToolTip.Tip="If checked you will be asked if you want to save the results when you close VDF"}={ToolTip.Tip="关闭VDF时提示保存扫描结果"}
{ToolTip.Tip="If checked non-existing files which have all necessary information are included"}={ToolTip.Tip="包含已记录完整信息的缺失文件"}
{ToolTip.Tip="If checked scan is also performed against your entire database unless database files are excluded otherwise (i.e. exclude list, file path must contain, etc)"}={ToolTip.Tip="扫描整个数据库（除非通过排除列表/路径过滤等设置跳过数据库文件）"}

{ToolTip.Tip="Minimum percentage that thumbnails must match before they are considered duplicates"}={ToolTip.Tip="缩略图相似度阈值（达到此百分比视为重复）"}
{ToolTip.Tip="Only scan videos against each other where the duration is not bigger/smaller than X %"}={ToolTip.Tip="仅比对时长差异不超过X%的视频"}
{ToolTip.Tip="Number of thumbnails generated per file. This only applies to video files. A high number means that the scan takes longer but also the chance of a 'false positive' decreases."}={ToolTip.Tip="每文件生成缩略图数量（仅视频）。数值越高查准率越高，扫描越慢。"}
{ToolTip.Tip="Limits the amount of concurrent tasks. A value of -1 leaves it up to the system to decide, a value of 1 is most stable."}={ToolTip.Tip="限制并发任务数量：值为 -1 时由系统自行决定，值为 1 时最稳定。"}
{ToolTip.Tip="FF(mpeg/probe) arguments passed to the end of the internal arguments. Most users can leave this empty."}={ToolTip.Tip="追加到FFmpeg/FFprobe内部参数后的自定义参数（多数用户可留空）。"}
{ToolTip.Tip="Hardware acceleration mode of ffmpeg"}={ToolTip.Tip="FFmpeg硬件加速模式"}
{ToolTip.Tip="Enter your own commands to open single or multiple files."}={ToolTip.Tip="自定义打开单文件/多文件的命令。"}
{ToolTip.Tip="E.g.: 'nemo --tabs %f', where '%f' is the placeholder for the file(s)"}={ToolTip.Tip="示例：'nemo --tabs %f'（%f=文件占位符）"}
{ToolTip.Tip="Specify a custom database folder. Otherwise it uses the current VDF folder."}={ToolTip.Tip="指定自定义数据库目录（默认使用VDF所在目录）。"}
{ToolTip.Tip="Limits the amount of concurrent tasks. A value of -1 leaves it up to the system to decide (takes full speed), a value of 1 is most stable (lets you interact with your system while scan runs in background). Maximum should be the amount of physical cores of your CPU."}={ToolTip.Tip="限制并发任务数量：值为 -1 时，由系统自行决定（以全速运行）；值为 1 时，最稳定（允许扫描在后台运行时，您与系统进行交互）。最大值应为 CPU 的物理核心数量。"}
{ToolTip.Tip="pHash = slower but more robust to re-encoding, resizing, contrast changes etc. Visual similarity = faster, also works on reencoded videos, watermarks etc but less robust. Ignored if you're using an old database with 16x16 graybyte values."}={ToolTip.Tip="pHash = 速度较慢，但​​对重新编码、调整大小、对比度变化等操作更稳健。视觉相似性 = 速度较快，也适用于重新编码的视频、水印等操作，但稳健性较差。如果您使用的是包含 16x16 灰度字节值的旧数据库，请忽略此参数。"}

{ToolTip.Tip="Re-run the scan but without enumerating and gathering file informations. Changing certain settings will only take effect during a full scan."}={ToolTip.Tip="重新扫描（跳过文件枚举）。部分设置需完整扫描才生效。"}
{ToolTip.Tip="Removes entries which file no longer exists or which failed on ffmpeg/ffprobe"}={ToolTip.Tip="移除文件不存在或FFmpeg/FFprobe处理失败的条目"}
{ToolTip.Tip="Keep longest / Best Quality. The order is: Duration, Resolution, FPS, Bitrate, Audio Bitrate"}={ToolTip.Tip="保留最长/最优质文件（优先级：时长>分辨率>FPS>码率>音频码率）。"}
{ToolTip.Tip="Note: if only one item of a group is matching, all group items will be shown"}={ToolTip.Tip="注意：组内任一项目匹配时，将显示该组所有项目"}

{ToolTip.Tip="Links all selected items to the first unselected item in each group."}={ToolTip.Tip="将选定项链接至组内首个未选项。"}
{ToolTip.Tip="Hides this group and exclude it from future scans, except when there is a new duplicate."}={ToolTip.Tip="隐藏该组并排除后续扫描（除非出现新重复项）。"}
{ToolTip.Tip="Note: Settings are automatically saved on normal exit"}={ToolTip.Tip="注意：正常退出时设置自动保存"}
{ToolTip.Tip="Read creation date from EXIF metadata (DateTimeOriginal) instead of file system date. Useful when file creation date is not accurate."}={ToolTip.Tip="从 EXIF 元数据 (DateTimeOriginal) 读取创建日期，而不是使用文件系统日期。当文件创建日期不准确时很有用。"}

{• Fastest}={• 速度最快}
{• More false positives}={• 误报率更高}
{• pHash algorithm is NOT available}={• pHash 算法不可用}
{• Slower than 16x16 (theoretically 4x slower but practically in most cases +40-60% additional scan time)}={• 比 16x16 慢（理论上慢 4 倍，但实际上在大多数情况下扫描时间增加 40-60%）}
{• Less false positives}={• 误报率更低}
{• pHash algorithm is available. More robust when duplicates differ due to changes in contrast, brightness, scaling, or minor edits (but not automatically better, it just works differently)}={• 提供 pHash 算法。当重复文件因对比度、亮度、缩放比例或细微编辑而发生变化时，该算法更加稳健（但并非一定更好，只是工作方式不同）}
{• When a video is first added to the database, pHash signature is automatically generated, making the initial scan slower. On subsequent rescans, you can switch between both algorithms with negligible performance cost, enabling highly efficient duplicate detection}={• 首次将视频添加到数据库时，会自动生成 pHash 签名，这会使初始扫描速度变慢。后续重新扫描时，您可以在两种算法之间切换，且性能成本几乎可以忽略不计，从而实现高效的重复文件检测}

