{"MainWindow.Settings.IgnoreBlackPixelsTooltip": "Skip black pixels when comparing thumbnails. Lowers the chance for 'false positives' if thumbnails contain too much dark and raises the chance to detect duplicates if one of the thumbnails have black bars and the others not. In rare scenarios this might raise the 'false positives' instead. Slows down the scan speed by a bit."}={"MainWindow.Settings.IgnoreBlackPixelsTooltip": "比较缩略图时跳过黑色像素。如果缩略图包含太多暗部，这会降低“误报”的几率；如果其中一个缩略图有黑边而其他没有，这会提高检测重复项的几率。在极少数情况下，这可能反而会增加“误报”。会略微降低扫描速度。"}
{"MainWindow.Settings.IgnoreReadOnlyFolders": "Ignore Read Only Folders"}={"MainWindow.Settings.IgnoreReadOnlyFolders": "忽略只读文件夹"}
{"MainWindow.Settings.IgnoreWhitePixels": "Ignore White Pixels"}={"MainWindow.Settings.IgnoreWhitePixels": "忽略白色像素"}
{"MainWindow.Settings.IgnoreWhitePixelsTooltip": "Skip white pixels when comparing thumbnails. Lowers the chance for 'false positives' if thumbnails contain too much brightness and raises the chance to detect duplicates if one of the thumbnails have white bars and the others not. In rare scenarios this might raise the 'false positives' instead. Slows down the scan speed by a bit."}={"MainWindow.Settings.IgnoreWhitePixelsTooltip": "比较缩略图时跳过白色像素。如果缩略图包含太多亮部，这会降低“误报”的几率；如果其中一个缩略图有白边而其他没有，这会提高检测重复项的几率。在极少数情况下，这可能反而会增加“误报”。会略微降低扫描速度。"}
{"MainWindow.Settings.IncludeImages": "Include Images"}={"MainWindow.Settings.IncludeImages": "包含图像"}
{"MainWindow.Settings.IncludeSubDirectories": "Include Sub Directories"}={"MainWindow.Settings.IncludeSubDirectories": "包含子目录"}
