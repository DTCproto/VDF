{"MainWindow.Settings.SaveTooltip": "Note: Settings are automatically saved on normal exit"}={"MainWindow.Settings.SaveTooltip": "注意：设置会在正常退出时自动保存"}
{"MainWindow.Settings.ScanAgainstEntireDatabase": "Scan against entire database"}={"MainWindow.Settings.ScanAgainstEntireDatabase": "扫描整个数据库"}
