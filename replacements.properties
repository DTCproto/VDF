{"ChooseAlgo.Title": "Choose Algorithm View"}={"ChooseAlgo.Title": "选择算法视图"}
{"ChooseAlgo.Description": "Please choose your graybyte database format. You cannot switch between them later on. The only way is to delete the entire database and start from scratch. Both use visual similarity frame check as default algorithm. In both cases you can find duplicates even if different resolution, added watermark, changes to fps / bitrate etc"}={"ChooseAlgo.Description": "请选择您的灰度字节数据库格式。之后无法在它们之间切换。唯一的办法是删除整个数据库并从头开始。两者默认都使用视觉相似性帧检查作为算法。在这两种情况下，即使分辨率不同、添加了水印、更改了帧率/码率等，您也可以找到重复项。"}
{"ChooseAlgo.Option16": "16x16"}={"ChooseAlgo.Option16": "16x16"}
{"ChooseAlgo.Option16Details": "• Fastest\n• More false positives\n• pHash algorithm is NOT available"}={"ChooseAlgo.Option16Details": "• 速度最快\n• 误报率更高\n• pHash 算法不可用"}
{"ChooseAlgo.Option32": "32x32 (recommmended)"}={"ChooseAlgo.Option32": "32x32 (推荐)"}
{"ChooseAlgo.Option32Details": "• Slower than 16x16 (theoretically 4x slower but practically in most cases +40-60% additional scan time)\n• Less false positives\n• pHash algorithm is available. More robust when duplicates differ due to changes in contrast, brightness, scaling, or minor edits (but not automatically better, it just works differently)\n• When a video is first added to the database, pHash signature is automatically generated, making the initial scan slower. On subsequent rescans, you can switch between both algorithms with negligible performance cost, enabling highly efficient duplicate detection"}={"ChooseAlgo.Option32Details": "• 比 16x16 慢（理论上慢 4 倍，但实际上在大多数情况下扫描时间增加 40-60%）\n• 误报率更低\n• pHash 算法可用。当重复文件因对比度、亮度、缩放比例或细微编辑而发生变化时，该算法更加稳健（但并非自动更好，只是工作方式不同）\n• 首次将视频添加到数据库时，会自动生成 pHash 签名，这会使初始扫描速度变慢。后续重新扫描时，您可以在两种算法之间切换，且性能成本几乎可以忽略不计，从而实现高效的重复文件检测"}
